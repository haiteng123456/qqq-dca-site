name: Update QQQ DCA site

on:
  schedule:
    # 22:30 UTC is 06:30 Beijing time on the next calendar day.
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update QQQ data
        run: python scripts/update_qqq.py
      - name: Commit data changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update QQQ 180-day DCA data"
          file_pattern: "data/*.csv public/data/*"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - uses: actions/deploy-pages@v4
